# =============================================================================
# DECAP CMS CONFIGURATION
# =============================================================================
# First-time setup:
# 1. Go to https://github.com/settings/developers → OAuth Apps → New OAuth App
# 2. Application name: Ing. Fattoruso Admin
# 3. Homepage URL: https://mfattoru.github.io
# 4. Authorization callback URL: https://mfattoru.github.io/admin/
# 5. Copy the "Client ID" and paste it below as app_id
# 6. Commit and push — then visit https://mfattoru.github.io/admin/
# =============================================================================

backend:
  name: github
  repo: mfattoru/mfattoru.github.io
  branch: master
  auth_type: pkce
  app_id: REPLACE_WITH_GITHUB_OAUTH_APP_CLIENT_ID

media_folder: public/image/uploads
public_folder: /image/uploads

collections:
  - name: "news-it"
    label: "Notizie (Italiano)"
    folder: "src/content/news-it"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titolo", name: "title", widget: "string" }
      - { label: "Data pubblicazione", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Descrizione breve", name: "description", widget: "string" }
      - { label: "Immagine copertina", name: "image", widget: "image", required: false }
      - { label: "Contenuto", name: "body", widget: "markdown" }

  - name: "news-en"
    label: "News (English)"
    folder: "src/content/news-en"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publication date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Short description", name: "description", widget: "string" }
      - { label: "Cover image", name: "image", widget: "image", required: false }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Progetti / Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titolo (IT)", name: "titleIt", widget: "string" }
      - { label: "Title (EN)", name: "titleEn", widget: "string" }
      - { label: "Anno", name: "year", widget: "string" }
      - { label: "Località (IT)", name: "locationIt", widget: "string" }
      - { label: "Location (EN)", name: "locationEn", widget: "string" }
      - { label: "Ruolo (IT)", name: "roleIt", widget: "string" }
      - { label: "Role (EN)", name: "roleEn", widget: "string" }
      - { label: "Stato (IT)", name: "statusIt", widget: "string", default: "Completato" }
      - { label: "Status (EN)", name: "statusEn", widget: "string", default: "Completed" }
      - { label: "Categoria (IT)", name: "categoryIt", widget: "string" }
      - { label: "Category (EN)", name: "categoryEn", widget: "string" }
      - { label: "Sommario (IT)", name: "summaryIt", widget: "text" }
      - { label: "Summary (EN)", name: "summaryEn", widget: "text" }
      - { label: "Risultato (IT)", name: "resultIt", widget: "text" }
      - { label: "Result (EN)", name: "resultEn", widget: "text" }
      - { label: "Immagine principale", name: "thumbnail", widget: "image" }
      - label: "Galleria foto"
        name: "gallery"
        widget: "list"
        field: { label: "Foto", name: "photo", widget: "image" }
      - { label: "Descrizione (IT/EN)", name: "body", widget: "markdown", required: false }
